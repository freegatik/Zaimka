name: Swift Lint

on:
  push:
  pull_request:

jobs:
  lint:
    name: SwiftLint & SwiftFormat
    runs-on: macos-15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install SwiftLint
      run: brew install swiftlint

    - name: Install SwiftFormat (pinned, see .github/scripts/install-swiftformat.sh)
      env:
        SWIFTFORMAT_VERSION: "0.61.0"
      run: bash .github/scripts/install-swiftformat.sh

    - name: Prefer pinned SwiftFormat on PATH
      run: |
        echo "/usr/local/bin" >> "$GITHUB_PATH"
        which swiftformat
        swiftformat --version

    - name: SwiftFormat (lint, no write)
      run: swiftformat . --lint --disable redundantViewBuilder

    - name: SwiftLint (strict)
      run: swiftlint --strict
