name: Build

on:
  push:
  pull_request:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.2.app

    - name: Prepare Xcode & iOS Simulator runtime
      run: |
        chmod +x .github/scripts/prepare-ios-ci.sh
        .github/scripts/prepare-ios-ci.sh
      timeout-minutes: 50
      
    - name: Install dependencies
      run: |
        brew install xcodegen
        brew install swiftlint

    - name: Install SwiftFormat (pinned)
      env:
        SWIFTFORMAT_VERSION: "0.61.0"
      run: bash .github/scripts/install-swiftformat.sh

    - name: Prefer pinned SwiftFormat on PATH
      run: echo "/usr/local/bin" >> "$GITHUB_PATH"

    - name: Generate Xcode project
      run: xcodegen generate
      
    - name: Build
      env:
        IPHONEOS_DEPLOYMENT_TARGET: "17.6"
      run: |
        set -o pipefail
        chmod +x .github/scripts/ensure-ci-simulator.sh
        chmod +x .github/scripts/xcode-sim-destination.sh
        echo "=== simctl: iOS runtimes ==="
        xcrun simctl list runtimes | grep -i ios || true
        SIM_UDID="$(.github/scripts/ensure-ci-simulator.sh)"
        DEST="$(.github/scripts/xcode-sim-destination.sh Zaimka.xcodeproj Zaimka "${SIM_UDID}")"
        echo "Destination: ${DEST}"
        xcodebuild clean build \
          -project Zaimka.xcodeproj \
          -scheme Zaimka \
          -sdk iphonesimulator \
          -destination "${DEST}" \
          EXCLUDED_ARCHS=x86_64 \
          ONLY_ACTIVE_ARCH=YES \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO | xcpretty
